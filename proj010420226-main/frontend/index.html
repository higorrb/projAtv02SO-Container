<!DOCTYPE html>
<html>
<head>
    <title>Relatório</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }

        th {
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

<h1>Relatório</h1>

<h2>Clientes</h2>
<table id="tabelaClientes">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Funcionários</h2>
<table id="tabelaFuncionarios">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Cargo</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function carregarClientes() {
    fetch('http://localhost:5000/api/clientes')
        .then(res => res.json())
        .then(data => {
            let tabela = document.querySelector("#tabelaClientes tbody");
            tabela.innerHTML = "";

            data.forEach(cliente => {
                tabela.innerHTML += `
                    <tr>
                        <td>${cliente.id}</td>
                        <td>${cliente.nome}</td>
                        <td>${cliente.email}</td>
                    </tr>
                `;
            });
        });
}

function carregarFuncionarios() {
    fetch('http://localhost:5000/api/funcionarios')
        .then(res => res.json())
        .then(data => {
            let tabela = document.querySelector("#tabelaFuncionarios tbody");
            tabela.innerHTML = "";

            data.forEach(func => {
                tabela.innerHTML += `
                    <tr>
                        <td>${func.id}</td>
                        <td>${func.nome}</td>
                        <td>${func.cargo}</td>
                    </tr>
                `;
            });
        });
}

// Carrega automaticamente ao abrir
carregarClientes();
carregarFuncionarios();
</script>

</body>
</html>
